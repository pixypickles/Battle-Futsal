<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Combat Airball Prototype 2.18</title>
<style>
  :root{
    --bg:#0d1326; --panel:#151e37; --ink:#f3f6ff; --muted:#a9b6d2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 15%,#263557 0,#0d1326 62%);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
  #wrap{height:100%;display:grid;place-items:center;padding:10px}
  #stage{
    position:relative;
    width:min(1280px,calc(100vw - 20px));
    height:min(720px,calc(100dvh - 20px));
    aspect-ratio:16/9;
    border:2px solid #516184;border-radius:18px;overflow:hidden;
    box-shadow:0 24px 80px #0008;background:#0b1020;
  }
  canvas{width:100%;height:100%;display:block}
  #hud{position:absolute;inset:0;pointer-events:none;z-index:5}
  #top{display:flex;justify-content:center;align-items:center;gap:18px;padding:14px;font-weight:900;text-shadow:0 2px 5px #000}
  .score{font-size:34px;min-width:50px;text-align:center}
  .blue{color:#7bdcff}.red{color:#ff8795}
  #timer{font-size:22px;padding:6px 13px;background:#0b1020aa;border:1px solid #ffffff28;border-radius:999px}
  #help{position:absolute;left:16px;bottom:14px;font-size:13px;line-height:1.55;color:#dce7ff;background:#091022b8;border:1px solid #ffffff20;border-radius:12px;padding:10px 12px;backdrop-filter:blur(8px)}
  #notice{position:absolute;left:50%;top:23%;transform:translateX(-50%);font-weight:1000;font-size:clamp(28px,5vw,66px);letter-spacing:.05em;text-shadow:0 5px 0 #0008,0 0 22px currentColor;opacity:0;transition:opacity .12s}
  #badge{position:absolute;right:14px;bottom:14px;color:#c7d2ed;font-size:12px;background:#091022a8;padding:7px 10px;border-radius:10px;border:1px solid #ffffff1b}
  #start{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(#07101bd4,#0a1024dc);pointer-events:auto;z-index:30}
  #card{width:min(690px,90%);padding:28px;border-radius:22px;background:#111a32e8;border:1px solid #ffffff2c;box-shadow:0 28px 90px #0009;text-align:center}
  h1{margin:0 0 8px;font-size:clamp(31px,5vw,58px);letter-spacing:.02em}
  .lead{color:#c1cdec;margin:0 auto 20px;max-width:560px;line-height:1.65}
  button{appearance:none;border:0;border-radius:999px;padding:14px 28px;font:inherit;font-weight:900;font-size:18px;color:#07101b;background:linear-gradient(180deg,#fff9a8,#ffbe40);box-shadow:0 8px 0 #9c5e13,0 16px 28px #0006;cursor:pointer}
  button:active{transform:translateY(5px);box-shadow:0 3px 0 #9c5e13}
  .small{font-size:12px;color:#91a0c0;margin-top:16px}
  @media(max-width:700px){#help{font-size:11px}.score{font-size:28px}}

  #touchControls{position:absolute;inset:0;z-index:20;pointer-events:none;display:none}
  .touchGroup{position:absolute;bottom:18px;display:flex;gap:12px;pointer-events:auto}
  #moveControls{left:18px}
  #actionControls{right:18px;align-items:flex-end}
  .touchBtn{
    width:76px;height:76px;padding:0;border-radius:50%;
    display:grid;place-items:center;user-select:none;-webkit-user-select:none;
    touch-action:none;font-size:28px;font-weight:1000;color:#fff;
    background:linear-gradient(180deg,#33415fdd,#17223ddd);
    border:2px solid #ffffff66;box-shadow:0 7px 0 #070b15aa,0 12px 28px #0008;
  }
  .touchBtn.action{width:82px;height:82px}
  .touchBtn.staff{background:linear-gradient(180deg,#ffd76aee,#b96f18ee);color:#211300}
  .touchBtn.kick{background:linear-gradient(180deg,#6ee8ffee,#16789aee);color:#04141b}
  .touchBtn.jump{background:linear-gradient(180deg,#bd9bffee,#6947bfee)}
  .touchBtn.smash{background:linear-gradient(180deg,#ff9b74ee,#a43a20ee)}
  .touchBtn.active{transform:translateY(6px) scale(.96);box-shadow:0 2px 0 #070b15aa}
  .touchLabel{font-size:12px;line-height:1.05;text-align:center}
  .touchLabel b{display:block;font-size:26px}
  @media (hover:none), (pointer:coarse), (max-width:900px){
    #touchControls{display:block}
    #help{display:none}
    #badge{bottom:112px}
    #top{padding-top:8px}
    .score{font-size:28px}
  }
  @media(max-width:560px){
    .touchBtn{width:64px;height:64px}
    .touchBtn.action{width:70px;height:70px}
    .touchGroup{gap:8px;bottom:10px}
    #moveControls{left:10px}
    #actionControls{right:10px}
    #badge{display:none}
  }


  @media (max-aspect-ratio: 1.35){
    #wrap{padding:0}
    #stage{
      width:100vw;
      height:100dvh;
      max-width:none;
      max-height:none;
      aspect-ratio:auto;
      border-radius:0;
      border-left:0;
      border-right:0;
    }
    canvas{
      width:100%;
      height:100%;
      object-fit:fill;
    }
    #top{
      padding-top:14px;
      gap:14px;
      transform:scale(1.08);
      transform-origin:top center;
    }
    #touchControls{display:block}
    #moveControls{
      left:max(10px,env(safe-area-inset-left));
      bottom:max(12px,env(safe-area-inset-bottom));
      flex-direction:row;
      gap:8px;
    }
    #actionControls{
      right:max(10px,env(safe-area-inset-right));
      bottom:max(12px,env(safe-area-inset-bottom));
      display:grid;
      grid-template-columns:repeat(2,68px);
      grid-template-rows:repeat(2,68px);
      gap:8px;
    }
    #actionControls .jump{grid-column:1;grid-row:1}
    #actionControls .staff{grid-column:2;grid-row:1}
    #actionControls .kick{grid-column:1;grid-row:2}
    #actionControls .smash{grid-column:2;grid-row:2}
    .touchBtn,.touchBtn.action{
      width:68px;height:68px;
      font-size:23px;
    }
    .touchLabel{font-size:10px}
    .touchLabel b{font-size:22px}
    #badge{display:none}
  }
  @media (max-aspect-ratio: 1.35) and (min-height:900px){
    #actionControls{
      grid-template-columns:repeat(2,84px);
      grid-template-rows:repeat(2,84px);
    }
    .touchBtn,.touchBtn.action{width:84px;height:84px}
  }


  @media (max-aspect-ratio:1.35){
    #start{padding:72px 18px 170px;overflow:auto;align-items:center}
    #card{
      width:min(620px,96%);
      max-height:calc(100dvh - 210px);
      overflow:auto;
      padding:clamp(18px,4vw,28px);
    }
    h1{font-size:clamp(30px,7vw,54px)}
    .lead{font-size:clamp(14px,3vw,20px);margin-bottom:16px}
    #card .small{font-size:clamp(10px,2.2vw,14px)}
    #play{padding:12px 24px;font-size:clamp(17px,3.4vw,22px)}
  }
  @media (max-aspect-ratio:1.35) and (max-height:760px){
    #start{padding-top:50px;padding-bottom:145px}
    #card{max-height:calc(100dvh - 170px);padding:16px}
    .lead{line-height:1.4}
  }


  @media (max-aspect-ratio:1.35){
    #moveControls .touchBtn{
      width:66px;
      height:66px;
    }
  }

</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="1280" height="720"></canvas>
    <div id="hud">
      <div id="runtimeError" style="display:none;position:absolute;z-index:100;left:12px;right:12px;top:12px;padding:12px;border-radius:12px;background:#7d1222;color:white;font-weight:800;pointer-events:auto"></div>
      <div id="top"><div class="score blue" id="sBlue">0</div><div id="timer">90</div><div class="score red" id="sRed">0</div></div>
      <div id="notice"></div>
      <div id="help">
        <b>青チーム（操作）</b><br>
        移動：A / D　ジャンプ：W（縦画面では大ジャンプ）<br>
        横突き：F　キック：G　風車／叩きつけ：H<br>
        <span style="color:#9fb0cf">F＝横 / G＝上 / H＝地上長押し風車 / 空中は1回転</span>
      </div>
      <div id="badge">Combat Airball Prototype 2.18</div>

      <div id="touchControls" aria-label="タッチ操作">
        <div class="touchGroup" id="moveControls">
          <button class="touchBtn" data-key="KeyA" aria-label="左へ移動">◀</button>
          <button class="touchBtn" data-key="KeyD" aria-label="右へ移動">▶</button>
        </div>
        <div class="touchGroup" id="actionControls">
          <button class="touchBtn action jump" data-key="KeyW" aria-label="ジャンプ"><span class="touchLabel"><b>↑</b>ジャンプ</span></button>
          <button class="touchBtn action staff" data-key="KeyF" aria-label="長棍"><span class="touchLabel"><b>F</b>長棍</span></button>
          <button class="touchBtn action kick" data-key="KeyG" aria-label="キック"><span class="touchLabel"><b>G</b>キック</span></button>
          <button class="touchBtn action smash" data-key="KeyH" aria-label="振り下ろし"><span class="touchLabel"><b>H</b>振下し</span></button>
        </div>
      </div>

      <div id="start">
        <div id="card">
          <h1>COMBAT AIRBALL</h1>
          <p class="lead">ボールを蹴り上げ、全員で空へ。横突きで狙い、H長押しの風車で守りながら押し返せ。</p>
          <button id="play">試合開始</button>
          <div class="small">青1体を操作。残り3体はAIです。ボタン・Enter・Space・画面タップで開始できます。</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(() => {
'use strict';

window.addEventListener('error',e=>{
  const box=document.getElementById('runtimeError');
  if(box){
    box.style.display='block';
    box.textContent='エラー: '+(e.message||'不明なエラー');
  }
});
window.addEventListener('unhandledrejection',e=>{
  const box=document.getElementById('runtimeError');
  if(box){
    box.style.display='block';
    box.textContent='エラー: '+String(e.reason||'処理に失敗しました');
  }
});

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W=1280,H=720,FLOOR=630,LEFT=62,RIGHT=1218;
let GOAL_TOP=355, GOAL_BOTTOM=525, GOAL_DEPTH=46;
let portraitMode=false;
function configureViewport(){
  portraitMode=(innerHeight/innerWidth)>0.74;
  if(portraitMode){
    canvas.width=900; canvas.height=1200;
    W=900; H=1200; FLOOR=1015; LEFT=42; RIGHT=858; GOAL_TOP=540; GOAL_BOTTOM=805; GOAL_DEPTH=46;
  }else{
    canvas.width=1280; canvas.height=720;
    W=1280; H=720; FLOOR=630; LEFT=62; RIGHT=1218; GOAL_TOP=355; GOAL_BOTTOM=525; GOAL_DEPTH=46;
  }
}
configureViewport();
addEventListener('resize',()=>{configureViewport(); if(typeof fighters!=='undefined') resetPositions();});
const BLUE=0, RED=1;
const keys = new Set();
let last=0, running=false, gameTime=90, scores=[0,0], freeze=0, shake=0, resetTimer=0;
const particles=[], trails=[];
const ui={
  blue:document.getElementById('sBlue'),
  red:document.getElementById('sRed'),
  timer:document.getElementById('timer'),
  notice:document.getElementById('notice'),
  start:document.getElementById('start')
};
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}
function sign(v){return v<0?-1:1}
function dist2(a,b){const x=a.x-b.x,y=a.y-b.y;return x*x+y*y}
function rnd(a,b){return a+Math.random()*(b-a)}
function circleHit(ax,ay,ar,bx,by,br){const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy<(ar+br)*(ar+br)}

class Fighter{
  constructor(x,team,ai=false){
    this.x=x; this.y=FLOOR-43; this.vx=0; this.vy=0; this.team=team; this.ai=ai;
    this.facing=team===BLUE?1:-1; this.onGround=true; this.coyote=0;
    this.attack=0; this.attackKind=''; this.kick=0; this.smash=0; this.spin=0; this.airSmashHit=false; this.stun=0; this.wallStun=0;
    this.jumpBuffer=0; this.attackCd=0; this.kickCd=0; this.smashCd=0; this.spinHitCd=0; this.flash=0; this.id=Math.random();
    this.targetX=x; this.airJumps=1;
  }
  control(dt){
    if(this.stun>0){this.stun-=dt; return}
    let move=0, jump=false, attack=false, kick=false, smash=false, spinHeld=false;
    if(!this.ai){
      move=(keys.has('KeyD')?1:0)-(keys.has('KeyA')?1:0);
      jump=pressed('KeyW');
      attack=pressed('KeyF');
      kick=pressed('KeyG');
      smash=pressed('KeyH');
      spinHeld=keys.has('KeyH') && this.onGround;
    } else {
      const b=ball;
      const attackRange=Math.abs(b.x-this.x)<135 && Math.abs(b.y-this.y)<90;
      const enemy=nearestEnemy(this);
      const defend = (this.team===BLUE && b.x<520)||(this.team===RED && b.x>760);
      let tx=b.x;
      if(defend) tx=this.team===BLUE?340:940;
      if(enemy && Math.abs(enemy.x-this.x)<120 && Math.abs(enemy.y-this.y)<95 && Math.random()<0.035) attack=true;
      if(attackRange){
        const towardOwnGoal=(this.team===BLUE&&b.vx<0)||(this.team===RED&&b.vx>0);
        if(towardOwnGoal && Math.random()<0.20){ smash=true; spinHeld=this.onGround&&Math.random()<0.65; }
        else if(!this.onGround && b.y>this.y-20 && Math.random()<0.10) smash=true;
        else if(!this.onGround && Math.abs(b.x-this.x)<120) attack=Math.random()<0.11;
        else if(Math.random()<0.075) kick=true;
      }
      if(b.y<this.y-80 && Math.abs(b.x-this.x)<260 && (this.onGround||this.airJumps>0) && Math.random()<0.05) jump=true;
      move=Math.abs(tx-this.x)>28?sign(tx-this.x):0;
      if(!this.onGround && Math.random()<0.015) move=sign(b.x-this.x);
    }
    if(move){
      const accel=this.onGround?1700:1050;
      this.vx+=move*accel*dt; this.facing=move;
    }
    const max=this.onGround?320:360;
    if(this.spin>0) this.vx*=0.88;
    this.vx=clamp(this.vx,-max,max);
    if(jump) this.jumpBuffer=.13;
    if(this.jumpBuffer>0){
      this.jumpBuffer-=dt;
      if(this.onGround||this.coyote>0){
        this.vy=portraitMode?-920:-690; this.onGround=false; this.coyote=0; this.jumpBuffer=0; burst(this.x,this.y+38,'#dff7ff',8);
      }else if(this.airJumps>0){
        this.vy=portraitMode?-820:-610; this.airJumps--; this.jumpBuffer=0; burst(this.x,this.y+26,'#cfe9ff',10);
      }
    }
    if(attack && this.attackCd<=0){
      this.attack=.42; this.attackCd=.48; this.attackKind=this.onGround?'ground':'air';
      this.vx+=this.facing*(this.onGround?45:95);
    }
    if(kick && this.kickCd<=0){this.kick=.31; this.kickCd=.38}
    if(smash && this.smashCd<=0){
      this.smash=this.onGround?.42:.50;
      this.smashCd=this.onGround?.18:.62;
      this.attackKind=this.onGround?'groundSmash':'airSmash';
      this.spin=this.onGround?.01:0;
      this.airSmashHit=false;
    }
    if(spinHeld && this.spin>0 && this.stun<=0){this.spin=Math.min(8,this.spin+dt)}
    else if((!spinHeld || !this.onGround) && this.smash<=0){this.spin=0}
  }
  update(dt){
    this.control(dt);
    this.attackCd=Math.max(0,this.attackCd-dt); this.kickCd=Math.max(0,this.kickCd-dt); this.smashCd=Math.max(0,this.smashCd-dt); this.spinHitCd=Math.max(0,this.spinHitCd-dt);
    this.flash=Math.max(0,this.flash-dt); this.wallStun=Math.max(0,this.wallStun-dt);
    if(this.attack>0) this.attack-=dt;
    if(this.kick>0) this.kick-=dt;
    if(this.smash>0) this.smash-=dt;
    if(this.spin>0 && this.smash<=0) this.attackKind=this.onGround?'groundSpin':'airSpin';
    if(!this.onGround){this.vy+=(portraitMode?1080:1350)*dt; this.coyote=Math.max(0,this.coyote-dt)}
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vx*=Math.pow(this.onGround?.80:.965,dt*60);
    if(this.y>=FLOOR-43){
      if(this.vy>250) burst(this.x,FLOOR-2,'#ffffff',5);
      this.y=FLOOR-43; this.vy=0; this.onGround=true; this.coyote=.09; this.airJumps=1;
    }else if(this.onGround){this.onGround=false}
    if(this.x<LEFT+28){
      this.x=LEFT+28;
      if(this.vx<-250){wallImpact(this,1)}
      else this.vx=Math.max(0,this.vx);
    }
    if(this.x>RIGHT-28){
      this.x=RIGHT-28;
      if(this.vx>250){wallImpact(this,-1)}
      else this.vx=Math.min(0,this.vx);
    }
    this.performHits();
  }
  performHits(){
    if(this.attack>0){
      const elapsed=(this.attackKind==='ground'?.42:.42)-this.attack;
      const active=elapsed>.07&&elapsed<.27;
      if(active){
        const reach=this.attackKind==='air'?150:142;
        const hx=this.x+this.facing*(70+reach*.45), hy=this.y+(this.attackKind==='air'?-7:-3);
        for(const o of fighters){
          if(o===this || o.team===this.team || o.flash>.06) continue;
          if(circleHit(hx,hy,70,o.x,o.y,31)){
            o.vx=this.facing*(this.attackKind==='air'?1120:1080);
            o.vy=this.attackKind==='air'?0:-20;
            o.stun=.22; o.flash=.14; freeze=.045; shake=14;
            burst(o.x,o.y,'#fff6b0',18); slashTrail(this.x,this.y,this.facing,'#fff2a6');
          }
        }
        if(ball.hitCd<=0 && circleHit(hx,hy,78,ball.x,ball.y,ball.r)){
          if(this.attackKind==='air'){
            ball.vx=this.facing*980;
            ball.vy=clamp(ball.vy*.12,-120,120);
          }else{
            ball.vx=this.facing*620;
            ball.vy=clamp(ball.vy*.25,-120,120);
          }
          ball.lastTeam=this.team; ball.hitCd=.12; freeze=.055; shake=17;
          burst(ball.x,ball.y,'#ffffff',22); slashTrail(this.x,this.y,this.facing,'#ffffff');
        }
      }
    }
    if(this.kick>0){
      const elapsed=.31-this.kick;
      if(elapsed>.08&&elapsed<.21 && ball.hitCd<=0){
        const hx=this.x+this.facing*28, hy=this.y+28;
        if(circleHit(hx,hy,66,ball.x,ball.y,ball.r)){
          ball.vx+=this.facing*90;
          ball.vy=-900;
          ball.lastTeam=this.team; ball.hitCd=.12; freeze=.035; shake=9;
          burst(ball.x,ball.y,'#b9f4ff',14);
        }
      }
    }
    if(this.smash>0 || this.spin>0){
      const airborne=this.attackKind==='airSmash' && !this.onGround;
      const elapsed=this.smash>0 ? (airborne?.50:.42)-this.smash : 1;
      const active=airborne ? (elapsed>.17&&elapsed<.36) : (this.spin>0 || (elapsed>.14&&elapsed<.34));

      if(active && this.spinHitCd<=0 && !(airborne&&this.airSmashHit)){
        const hx=this.x+this.facing*(airborne?74:106);
        const hy=this.y+(airborne?72:18);

        for(const o of fighters){
          if(o===this || o.team===this.team || o.flash>.06) continue;
          if(circleHit(hx,hy,airborne?82:90,o.x,o.y,31)){
            o.vx=this.facing*(airborne?120:540);
            o.vy=airborne?1080:180;
            o.stun=airborne?.32:.22; o.flash=.12; freeze=.035; shake=14;
            burst(o.x,o.y,'#ffd4bd',16);
            smashTrail(this.x,this.y,this.facing,'#ffb48e');
            this.spinHitCd=airborne?.45:.16;
            if(airborne) this.airSmashHit=true;
          }
        }

        if(ball.hitCd<=0 && circleHit(hx,hy,airborne?88:100,ball.x,ball.y,ball.r)){
          ball.vx=this.facing*(airborne?470:900);
          ball.vy=airborne?760:-180;
          ball.lastTeam=this.team; ball.hitCd=.11; freeze=.035; shake=15;
          burst(ball.x,ball.y,'#fff0d8',18);
          smashTrail(this.x,this.y,this.facing,'#fff0c2');
          this.spinHitCd=airborne?.45:.13;
          if(airborne) this.airSmashHit=true;
        }
      }
    }
  }
  draw(){
    const phase=performance.now()/120;
    const teamC=this.team===BLUE?'#2db9ff':'#ff5277';
    const dark=this.team===BLUE?'#113c58':'#5c1830';
    const skin='#f0bf8a';
    const outline='#dff7ff';
    const attackP=this.attack>0?1-this.attack/.42:0;
    const kickP=this.kick>0?1-this.kick/.31:0;
    const smashP=this.smash>0?1-this.smash/.48:0;
    const air=!this.onGround;

    ctx.save();
    ctx.translate(this.x,this.y);
    if(this.facing<0) ctx.scale(-1,1);
    if(this.flash>0){ctx.shadowBlur=25;ctx.shadowColor='#fff'}

    // Ground shadow
    ctx.save();
    ctx.globalAlpha=.22;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(0,42,29,8,0,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // Body lean
    let bodyRot=0;
    if(this.stun>0) bodyRot=.48;
    else if(this.smash>0) bodyRot=lerp(-.08,.30,Math.min(1,smashP*1.15));
    else if(this.attack>0) bodyRot=-.13*Math.sin(Math.min(1,attackP)*Math.PI);
    else if(air) bodyRot=this.vy<0?-.07:.08;
    ctx.rotate(bodyRot);

    // Trailing bandana/scarf — visual from the post-ninja monk prototype.
    ctx.strokeStyle=teamC;ctx.lineWidth=7;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-8,-31);
    ctx.quadraticCurveTo(-34-this.vx*.025,-38,-47-this.vx*.035,-19-this.vy*.018);
    ctx.stroke();

    // Legs
    const run=Math.sin(phase*1.7);
    ctx.strokeStyle='#eef3f8';ctx.lineWidth=10;ctx.lineCap='round';
    if(this.kick>0){
      const k=Math.sin(Math.min(1,kickP)*Math.PI);
      ctx.beginPath();ctx.moveTo(-7,10);ctx.lineTo(-13,39);ctx.stroke();
      ctx.beginPath();ctx.moveTo(7,10);ctx.lineTo(20+38*k,36-25*k);ctx.stroke();
    }else if(air){
      ctx.beginPath();ctx.moveTo(-7,10);ctx.lineTo(-19,37);ctx.stroke();
      ctx.beginPath();ctx.moveTo(7,10);ctx.lineTo(17,35);ctx.stroke();
    }else{
      ctx.beginPath();ctx.moveTo(-7,10);ctx.lineTo(-11+run*4,40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(7,10);ctx.lineTo(11-run*4,40);ctx.stroke();
    }

    // Robe
    ctx.fillStyle=teamC;ctx.strokeStyle=outline;ctx.lineWidth=3;
    ctx.beginPath();ctx.roundRect(-17,-27,34,41,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=dark;ctx.fillRect(-18,5,36,7);
    ctx.fillStyle='#f6cf55';ctx.beginPath();ctx.arc(0,8.5,4,0,Math.PI*2);ctx.fill();

    // Head
    ctx.fillStyle=skin;ctx.strokeStyle=outline;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,-42,16,0,Math.PI*2);ctx.fill();ctx.stroke();

    // Dark hair/hood plus a clear bandana strip.
    ctx.fillStyle='#11232f';
    ctx.beginPath();ctx.arc(0,-46,16,Math.PI,Math.PI*2);ctx.lineTo(15,-39);
    ctx.quadraticCurveTo(4,-31,-15,-38);ctx.closePath();ctx.fill();
    ctx.fillStyle=teamC;ctx.fillRect(-14,-47,28,6);
    ctx.fillStyle='#eafaff';ctx.fillRect(-9,-43,18,3);
    ctx.fillStyle='#17212a';ctx.beginPath();ctx.arc(5,-41,2,0,Math.PI*2);ctx.fill();

    // Staff pose. Local positive X is always the character's forward direction.
    let cx=0, cy=-12, angle=-.12;
    let staffLen=214;

    if(this.attack>0){
      if(this.attackKind==='air'){
        const p=easeOutBack(Math.min(1,attackP*1.35));
        cx=lerp(-26,62,p); cy=-12; angle=lerp(-.10,0,p);
      }else{
        const p=easeOutBack(Math.min(1,attackP*1.35));
        cx=lerp(-24,72,p);
        cy=-11;
        angle=lerp(-.06,0,p);
      }
    }

    if(this.smash>0 || this.spin>0){
      let theta=0;
      if(this.attackKind==='airSmash' && this.smash>0){
        const p=Math.min(1,1-this.smash/.50);
        theta=p*Math.PI*2;
      }else{
        const initial=this.smash>0?Math.min(1,1-this.smash/.42):1;
        const revolutions=this.spin>0?this.spin*7.8:0;
        theta=initial*Math.PI*1.95+revolutions;
      }
      cx=18;
      cy=-13;
      angle=-.12+theta;
    }

    // Staff endpoints
    const hx=Math.cos(angle), hy=Math.sin(angle);
    const rearX=cx-hx*staffLen*.5, rearY=cy-hy*staffLen*.5;
    const frontX=cx+hx*staffLen*.5, frontY=cy+hy*staffLen*.5;

    // Both hands stay on the shaft and swap leading/trailing roles naturally.
    const hand1={x:cx-hx*18,y:cy-hy*18};
    const hand2={x:cx+hx*18,y:cy+hy*18};

    // Arms behind staff
    ctx.strokeStyle=skin;ctx.lineWidth=9;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-11,-17);ctx.lineTo(hand1.x,hand1.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(11,-17);ctx.lineTo(hand2.x,hand2.y);ctx.stroke();

    // Long staff
    ctx.strokeStyle='#68411f';ctx.lineWidth=9;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(rearX,rearY);ctx.lineTo(frontX,frontY);ctx.stroke();
    ctx.strokeStyle='#f6cf63';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(rearX,rearY);ctx.lineTo(frontX,frontY);ctx.stroke();

    if(this.stun>0){
      ctx.strokeStyle='#ffd94a';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,-69,13,0,Math.PI*1.5);ctx.stroke();
    }
    ctx.restore();
  }
}

function easeOutBack(x){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2)}
function wallImpact(f,dir){
  f.vx=0; f.vy=Math.min(f.vy,80); f.stun=.38; f.wallStun=.38; shake=18; freeze=.045;
  burst(f.x,f.y,'#ffffff',24);
  for(let i=0;i<8;i++) particles.push({x:f.x,y:f.y,vx:dir*rnd(60,300),vy:rnd(-220,220),life:rnd(.18,.5),max:.5,size:rnd(2,6),c:'#a6b7d9'});
}
function nearestEnemy(f){
  let best=null,bd=1e9; for(const o of fighters){if(o.team!==f.team){const d=dist2(f,o);if(d<bd){bd=d;best=o}}} return best;
}

class Ball{
  constructor(){this.r=18;this.reset()}
  reset(){this.x=W/2;this.y=310;this.vx=rnd(-80,80);this.vy=-80;this.hitCd=0;this.lastTeam=-1}
  update(dt){
    this.hitCd=Math.max(0,this.hitCd-dt);
    this.vy+=620*dt; this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vx*=Math.pow(.996,dt*60);
    if(this.y>FLOOR-this.r){this.y=FLOOR-this.r;this.vy=-Math.abs(this.vy)*.66;if(Math.abs(this.vy)<80)this.vy=-80;this.vx*=.93}
    if(this.y<this.r+38){this.y=this.r+38;this.vy=Math.abs(this.vy)*.72}
    // Goal mouth has mouse-guard lips at both upper and lower corners.
    // A ball must pass through the central opening; grazing either lip bounces it back.
    const guardLen=portraitMode?78:58;
    const mouthTop=GOAL_TOP+guardLen;
    const mouthBottom=GOAL_BOTTOM-guardLen;
    const leftGoalPlane=LEFT+GOAL_DEPTH;
    const rightGoalPlane=RIGHT-GOAL_DEPTH;

    const hitUpperLip=this.y-this.r<GOAL_TOP+guardLen && this.y+this.r>GOAL_TOP-8;
    const hitLowerLip=this.y+this.r>GOAL_BOTTOM-guardLen && this.y-this.r<GOAL_BOTTOM+8;

    // Left goal lips
    if(this.x-this.r<leftGoalPlane && this.x>LEFT-4 && (hitUpperLip||hitLowerLip)){
      this.x=leftGoalPlane+this.r;
      this.vx=Math.abs(this.vx)*.82;
      this.vy+=(hitUpperLip?180:-180);
      burst(this.x,this.y,'#79dbff',8);
    }

    // Right goal lips
    if(this.x+this.r>rightGoalPlane && this.x<RIGHT+4 && (hitUpperLip||hitLowerLip)){
      this.x=rightGoalPlane-this.r;
      this.vx=-Math.abs(this.vx)*.82;
      this.vy+=(hitUpperLip?180:-180);
      burst(this.x,this.y,'#ff8795',8);
    }

    const inGoalMouth=this.y>mouthTop&&this.y<mouthBottom;
    if(this.x<leftGoalPlane && inGoalMouth){score(RED);return}
    if(this.x>rightGoalPlane && inGoalMouth){score(BLUE);return}

    if(this.x<LEFT+this.r){this.x=LEFT+this.r;this.vx=Math.abs(this.vx)*.75}
    if(this.x>RIGHT-this.r){this.x=RIGHT-this.r;this.vx=-Math.abs(this.vx)*.75}
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(performance.now()/350);
    ctx.shadowBlur=25;ctx.shadowColor='#fff';
    const g=ctx.createRadialGradient(-6,-7,2,0,0,22);g.addColorStop(0,'#fff');g.addColorStop(.55,'#e8f6ff');g.addColorStop(1,'#6ecdf3');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#274c6a';ctx.lineWidth=2;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,0,6+i*4,i*1.8,i*1.8+1.4);ctx.stroke()}
    ctx.restore();
  }
}

const fighters=[
  new Fighter(300,BLUE,false),new Fighter(455,BLUE,true),
  new Fighter(825,RED,true),new Fighter(980,RED,true)
];
const ball=new Ball();
const pressQueue=new Set();
addEventListener('keydown',e=>{
  if(['KeyA','KeyD','KeyW','KeyF','KeyG','KeyH','Enter','Space'].includes(e.code)) e.preventDefault();
  if(!keys.has(e.code)) pressQueue.add(e.code);
  keys.add(e.code);
  if((e.code==='Enter'||e.code==='Space')&&!running) startGame();
});
addEventListener('keyup',e=>keys.delete(e.code));
function pressed(code){if(pressQueue.has(code)){pressQueue.delete(code);return true}return false}
const playButton=document.getElementById('play');
playButton.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();startGame();});
playButton.addEventListener('pointerup',e=>{e.preventDefault();e.stopPropagation();startGame();});
playButton.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();startGame();},{passive:false});

// Touch / pointer controls
document.querySelectorAll('.touchBtn').forEach(btn=>{
  const code=btn.dataset.key;
  const down=(e)=>{
    e.preventDefault();
    if(!keys.has(code)) pressQueue.add(code);
    keys.add(code);
    btn.classList.add('active');
    try{btn.setPointerCapture(e.pointerId)}catch(_){}
  };
  const up=(e)=>{
    e.preventDefault();
    keys.delete(code);
    btn.classList.remove('active');
  };
  btn.addEventListener('pointerdown',down);
  btn.addEventListener('pointerup',up);
  btn.addEventListener('pointercancel',up);
  btn.addEventListener('lostpointercapture',up);
  btn.addEventListener('contextmenu',e=>e.preventDefault());
});
ui.start.addEventListener('pointerdown',e=>{
  if(e.target.id!=='play' && !running) startGame();
});


function startGame(){
  if(running) return;
  document.querySelector('#card h1').textContent='COMBAT AIRBALL';
  document.querySelector('#card .lead').textContent='ボールを蹴り上げ、全員で空へ。横突きで狙い、H長押しの風車で守りながら押し返せ。';
  document.getElementById('play').textContent='試合開始';
  running=true; gameTime=90;scores=[0,0];
  ui.blue.textContent='0'; ui.red.textContent='0';
  ui.start.style.display='none';resetPositions();showNotice('AIRBALL!', '#fff4a6');
}
function resetPositions(){
  const xs=portraitMode?[205,345,555,695]:[300,455,825,980];
  fighters.forEach((f,i)=>{f.x=xs[i];f.y=FLOOR-43;f.vx=f.vy=0;f.stun=0;f.attack=0;f.kick=0;f.smash=0;f.spin=0;f.airSmashHit=false;f.onGround=true;f.airJumps=1});
  ball.reset(); resetTimer=.65;
}
function score(team){
  if(resetTimer>0)return;
  scores[team]++; ui.blue.textContent=scores[0];ui.red.textContent=scores[1];
  showNotice(team===BLUE?'BLUE GOAL!':'RED GOAL!',team===BLUE?'#79dbff':'#ff8290');
  shake=30;freeze=.12; burst(ball.x,ball.y,team===BLUE?'#7bdcff':'#ff8795',55);
  resetPositions();
}
function showNotice(text,color){
  ui.notice.textContent=text;ui.notice.style.color=color;ui.notice.style.opacity=1;
  clearTimeout(showNotice.t);showNotice.t=setTimeout(()=>ui.notice.style.opacity=0,900);
}
function burst(x,y,c,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=rnd(70,420);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.18,.65),max:.65,size:rnd(2,8),c})}
}
function slashTrail(x,y,dir,c){trails.push({x,y,dir,c,life:.18,max:.18,type:'slash'})}
function smashTrail(x,y,dir,c){trails.push({x,y,dir,c,life:.24,max:.24,type:'smash'})}

function update(dt){
  if(!running)return;
  if(freeze>0){freeze-=dt;return}
  resetTimer=Math.max(0,resetTimer-dt);
  gameTime-=dt; if(gameTime<=0){gameTime=0;running=false;ui.start.style.display='grid';document.querySelector('#card h1').textContent=scores[0]===scores[1]?'DRAW!':scores[0]>scores[1]?'BLUE WINS!':'RED WINS!';document.querySelector('#card .lead').textContent=`最終スコア ${scores[0]} - ${scores[1]}`;document.getElementById('play').textContent='もう一度';}
  ui.timer.textContent=Math.ceil(gameTime);
  fighters.forEach(f=>f.update(dt)); ball.update(dt);
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=520*dt;p.vx*=.985;if(p.life<=0)particles.splice(i,1)}
  for(let i=trails.length-1;i>=0;i--){trails[i].life-=dt;if(trails[i].life<=0)trails.splice(i,1)}
  shake=Math.max(0,shake-70*dt);
  pressQueue.clear();
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
function drawArena(){
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#172345');grd.addColorStop(.65,'#0d1832');grd.addColorStop(1,'#09101f');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // distant bands
  ctx.globalAlpha=.16;ctx.strokeStyle='#6e83bd';ctx.lineWidth=2;
  for(let y=110;y<580;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.globalAlpha=1;
  // floor trampoline
  ctx.fillStyle='#101b31';ctx.fillRect(0,FLOOR,W,H-FLOOR);
  ctx.strokeStyle='#a5d9ff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(LEFT,FLOOR);ctx.quadraticCurveTo(W/2,FLOOR+16,RIGHT,FLOOR);ctx.stroke();
  ctx.globalAlpha=.3;ctx.strokeStyle='#5d77a7';ctx.lineWidth=2;for(let x=LEFT;x<RIGHT;x+=48){ctx.beginPath();ctx.moveTo(x,FLOOR+2);ctx.lineTo(x+20,H);ctx.stroke()}ctx.globalAlpha=1;
  // side walls
  ctx.strokeStyle='#7586aa';ctx.lineWidth=5;ctx.strokeRect(LEFT,38,RIGHT-LEFT,FLOOR-38);
  // goals + upward-shot guard lips
  drawGoal(LEFT,1,'#47c6ff');drawGoal(RIGHT,-1,'#ff6074');
  // center
  ctx.setLineDash([9,12]);ctx.strokeStyle='#ffffff2d';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2,70);ctx.lineTo(W/2,FLOOR);ctx.stroke();ctx.setLineDash([]);
}
function drawGoal(x,dir,c){
  const guardLen=portraitMode?78:58;
  const lipDepth=portraitMode?54:38;
  ctx.save();
  ctx.strokeStyle=c;ctx.lineWidth=7;ctx.shadowBlur=18;ctx.shadowColor=c;

  // Goal frame
  ctx.beginPath();
  ctx.moveTo(x,GOAL_TOP);
  ctx.lineTo(x+dir*GOAL_DEPTH,GOAL_TOP);
  ctx.lineTo(x+dir*GOAL_DEPTH,GOAL_BOTTOM);
  ctx.lineTo(x,GOAL_BOTTOM);
  ctx.stroke();

  // Upper mouse guard: projects inward and downward.
  ctx.lineWidth=11;
  ctx.beginPath();
  ctx.moveTo(x+dir*GOAL_DEPTH,GOAL_TOP+4);
  ctx.lineTo(x+dir*(GOAL_DEPTH+lipDepth),GOAL_TOP+guardLen);
  ctx.stroke();

  // Lower mouse guard: projects inward and upward.
  ctx.beginPath();
  ctx.moveTo(x+dir*GOAL_DEPTH,GOAL_BOTTOM-4);
  ctx.lineTo(x+dir*(GOAL_DEPTH+lipDepth),GOAL_BOTTOM-guardLen);
  ctx.stroke();

  // Goal interior
  ctx.globalAlpha=.23;
  ctx.fillStyle=c;
  ctx.fillRect(dir>0?x:x-GOAL_DEPTH,GOAL_TOP,GOAL_DEPTH,GOAL_BOTTOM-GOAL_TOP);
  ctx.restore();
}
function draw(){
  ctx.save();
  const sx=shake?rnd(-shake,shake):0, sy=shake?rnd(-shake*.55,shake*.55):0;ctx.translate(sx,sy);
  drawArena();
  // trails behind actors
  for(const t of trails){
    const a=t.life/t.max;ctx.save();ctx.globalAlpha=a*.78;ctx.strokeStyle=t.c;ctx.lineWidth=26*a+4;ctx.lineCap='round';ctx.shadowBlur=24;ctx.shadowColor=t.c;
    ctx.beginPath();
    if(t.type==='smash'){
      ctx.arc(t.x,t.y-10,108,-2.7,.7);
    }else{
      ctx.moveTo(t.x-t.dir*92,t.y-8);
      ctx.quadraticCurveTo(t.x,t.y-42,t.x+t.dir*150,t.y);
    }
    ctx.stroke();ctx.restore();
  }
  ball.draw();fighters.forEach(f=>f.draw());
  for(const p of particles){ctx.globalAlpha=clamp(p.life/p.max,0,1);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
  ctx.restore();
}
function loop(ts){const dt=Math.min(.033,(ts-last)/1000||0);last=ts;update(dt);draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
})();
</script>
</body>
