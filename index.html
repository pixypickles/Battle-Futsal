<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Combat Airball Prototype 2.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <div class="title">COMBAT AIRBALL</div>
      <div class="score"><span class="blue">BLUE <b id="blueScore">0</b></span><span>–</span><span class="red"><b id="redScore">0</b> RED</span></div>
    </header>

    <section class="game-wrap">
      <canvas id="game" width="960" height="620" aria-label="Combat Airball game canvas"></canvas>
      <div class="status" id="status">A: 武器　B: キック　C: ジャンプ</div>
    </section>

    <section class="controls">
      <div class="pad" id="pad">
        <button class="left" data-key="ArrowLeft">◀</button>
        <button class="right" data-key="ArrowRight">▶</button>
      </div>
      <div class="buttons">
        <button class="a" data-key="KeyJ"><strong>A</strong><span>武器</span></button>
        <button class="b" data-key="KeyK"><strong>B</strong><span>キック</span></button>
        <button class="c" data-key="KeyL"><strong>C</strong><span>ジャンプ</span></button>
      </div>
    </section>

    <footer>
      移動: A/D・←/→　J: 武器　K: キック/空中ボレー　L: ジャンプ/壁ジャンプ　R: リセット
    </footer>
  </main>
  <script src="game.js"></script>
</body>
</html>
