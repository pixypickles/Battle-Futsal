<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Combat Airball v0.6</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="shell">
  <header>
    <div><b>COMBAT AIRBALL</b><span>v0.6 — Aerial Control</span></div>
    <div id="score">BLUE 0 — 0 RED</div>
  </header>
  <main><canvas id="game" width="1100" height="700"></canvas></main>
  <div class="help">移動: WASD / 矢印　J: 武器　K: キック　L: ジャンプ / 壁ジャンプ　R: リセット</div>
  <div class="mobile">
    <div id="stick" class="stick"><div id="knob" class="knob"></div></div>
    <div class="buttons"><button id="btnA">A<small>武器</small></button><button id="btnB">B<small>キック</small></button><button id="btnC">C<small>ジャンプ</small></button></div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
