<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#101820" />
  <title>Battle Futsal Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="hud">
      <div><span id="blueScore">0</span> - <span id="redScore">0</span></div>
      <div id="timer">02:00</div>
      <button id="restartBtn" type="button">RESTART</button>
    </header>

    <canvas id="game" aria-label="Battle Futsal game canvas"></canvas>

    <section class="controls" aria-label="touch controls">
      <div id="stick" class="stick" aria-label="movement stick">
        <div id="stickKnob" class="stick-knob"></div>
      </div>
      <div class="buttons">
        <button id="btnC" class="action c" type="button">C</button>
        <button id="btnA" class="action a" type="button">A</button>
        <button id="btnB" class="action b" type="button">B</button>
      </div>
    </section>

    <div id="message" class="message" hidden></div>
  </main>

  <script src="game.js"></script>
</body>
</html>
